openapi: 3.0.3
info:
  title: "ChargeAndTrack"
  description: This is the API of ChargeAndTrack
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0
servers:
  - url: https://0.0.0.0:3000/api/v1
tags:
  - name: account
    description: User account
  - name: car
    description: Car

paths:
  /login:
    post:
      tags:
        - account
      description: User login
      operationId: login
      requestBody:
        description: user credentials
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: user successfully logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  role:
                    description: user role
                    type: string
                  token:
                    description: authorization token
                    type: string

  /user:
    get:
      tags:
        - account
      description: Get user information
      operationId: getUser
      responses:
        '200':
          description: user information retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: user not found

  /cars:
    get:
      tags:
        - car
      description: Get all cars of the user
      operationId: getUserCars
      responses:
        '200':
          description: list of cars of the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Car'
        '404':
          description: user not found
    post:
      tags:
        - car
      description: Add a new car to the user
      operationId: addUserCar
      requestBody:
        description: car data
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plate:
                  type: string
                maxBattery:
                  type: number
      responses:
        '201':
          description: car added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
        '404':
          description: user not found

  /cars/{id}:
    get:
      tags:
        - car
      description: Get car by id
      operationId: readCar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: car retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
        '404':
          description: car not found
    put:
      tags:
        - car
      description: Update car
      operationId: updateCar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: car data
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plate:
                  type: string
                maxBattery:
                  type: number
                currentBattery:
                  type: number
      responses:
        '200':
          description: car updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Car'
        '404':
          description: car not found
    delete:
      tags:
        - car
      description: Delete car
      operationId: deleteCar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: car deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  cars:
                    type: array
                    items:
                      $ref: '#/components/schemas/Car'
        '404':
          description: car not found

components:
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        username:
          type: string
        password:
          type: string
        role:
          type: string
        cars:
          type: array
          items:
            $ref: '#/components/schemas/Car'
    Car:
      type: object
      properties:
        _id:
          type: string
        plate:
          type: string
        maxBattery:
          type: number
        currentBattery:
          type: number
        currentChargingStationId:
          type: string
